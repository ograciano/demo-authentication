spring.datasource.url=jdbc:h2:mem:authdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

app.jwt.secret=test-secret-key-that-is-at-least-thirty-two-bytes-long
app.jwt.expiration-seconds=3600
app.registration.initial-permission=REPORT:READ

authorization-service.url=http://localhost:8081
