spring.application.name=authentication

# H2 local/testing persistence
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# JWT configuration (HS256, secret >= 256 bits)
app.jwt.secret=replace-with-a-secure-256-bit-secret-key-at-least-32-bytes
app.jwt.expiration-seconds=3600
app.registration.initial-permission=REPORT:READ

# Authorization-service integration (Feign)
authorization-service.url=http://localhost:8081
spring.cloud.openfeign.client.config.authorization-service.connectTimeout=2000
spring.cloud.openfeign.client.config.authorization-service.readTimeout=2000
