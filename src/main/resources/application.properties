spring.application.name=authentication

spring.datasource.url=jdbc:h2:mem:authentication;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

app.authorization.base-url=http://localhost:8081
app.jwt.secret=01234567890123456789012345678901
app.jwt.expiration-seconds=3600

# Login rate limiting
app.security.rate-limit.max-attempts-per-ip=20
app.security.rate-limit.max-attempts-per-email=10
app.security.rate-limit.window-seconds=60

# Login lockout
app.security.lockout.max-failures=5
app.security.lockout.duration-seconds=300

